version: 1
product: ClawScreen
north_star: Agent-native HUD with trustworthy, adaptive, tool-backed UI

recent_updates:
  - date: 2026-03-10
    change: Completed REL-003 deterministic run replay and timeline inspector with replay-derived visible state, provenance-rich event inspection, and a first-class admin UI entrypoint
    rationale: ClawScreen can now reconstruct the visible screen from append-only run events, inspect narrative/UI/control flow without dumping raw JSON first, and make trust/provenance review part of the product instead of a backend-only artifact.
  - date: 2026-03-10
    change: Completed INT-010 mixed text + UI normalization with server guardrails, frontend HUD composition, and action-aware artifact responses
    rationale: ClawScreen now normalizes sparse/mixed model output into a stable glanceable HUD, preserves actionable controls, and degrades safely instead of exposing brittle raw payload structure.
  - date: 2026-03-10
    change: Expanded INT-009 and added INT-010/REL-003 to prioritize mixed text+UI run streams, append-only timeline provenance, and deterministic replay tooling
    rationale: Latest deep research shows ecosystem movement is mostly runtime hardening rather than a fresh spec jump; durable differentiation is now in one governed run model that handles text, UI deltas, interrupts, screenshot/action fallback, and trust metadata in the same observable timeline.
  - date: 2026-03-09
    change: Added INT-009 as P0/ready for unified run-state, interrupt, capability, and trust contract across declarative UI and screenshot/action execution
    rationale: Latest A2UI/runtime movement and computer-use guidance converged on orchestration correctness over raw schema churn; ClawScreen now needs one typed run contract that validates UI deltas, governs interrupt/resume, advertises capabilities, and tags trusted vs untrusted content before renderer/backend fragmentation sets in.
  - date: 2026-03-08
    change: Elevated INT-008 to P0/ready and expanded acceptance for provider-specific computer-use parity
    rationale: Latest provider guidance converges on screenshot-first turns, batched action execution, tool-version negotiation, and high-impact human confirmation; shipping this adapter now unlocks faster backend portability and safer real-world automation.
  - date: 2026-03-07
    change: Elevated interrupt-aware lifecycle and computer-use bridge work into active roadmap
    rationale: External protocol signals point to convergence on explicit interrupt/resume semantics and screenshot/action harness loops; ClawScreen should align now to reduce integration churn and improve human-control safety.
  - date: 2026-03-06
    change: Completed UI-001 frontend polish pass for dynamic A2UI surfaces
    rationale: Fixed tab keyboard switching IDs, improved status/streaming readability, tightened long-content overflow behavior, and strengthened responsive/focus affordances without changing generation functionality.
  - date: 2026-03-05
    change: Completed TRUST-001 source and freshness badges in primary status rail
    rationale: Added per-screen source badges derived from payload provenance and explicit last-updated timestamp so users can quickly judge trust/freshness without opening debug JSON.
  - date: 2026-03-05
    change: Completed INT-006 dual-stack transport compatibility and capability advertisement
    rationale: Added v0.8/v0.9 message alias normalization, deterministic ValidationFailed guidance, and explicit capability metadata for safer client/server interoperability.
  - date: 2026-03-05
    change: Elevated INT-006 from P1/todo to P0/ready
    rationale: A2UI v0.9 introduces breaking lifecycle and schema shifts (createSurface/updateComponents/updateDataModel/sendDataModel, unified catalog, stricter validation); interoperability and trust UX now depend on proactive transport compatibility.

lanes:
  - id: reliability
    outcome: Stable, low-latency generation/render pipeline
  - id: interaction
    outcome: Agentic interaction loop (event -> LLM-decided next UI)
  - id: trust_ux
    outcome: Source/freshness/explainability in every surface
  - id: ui_polish
    outcome: Cohesive, premium HUD quality and clear visual hierarchy under dynamic generation

backlog:
  # execution metadata:
  # - status: todo|ready|in_progress|blocked|done
  # - owner: single accountable owner while in_progress (optional when todo/ready)
  # - target_date: YYYY-MM-DD for active items when known
  - id: REL-001
    lane: reliability
    title: Gateway polling termination hardening
    priority: P0
    status: done
    last_updated: 2026-02-27
    acceptance:
      - No long polling after terminal assistant stop without parseable JSON
      - Clear retry reason surfaced to UI
      - test/typecheck/build pass
  - id: INT-001
    lane: interaction
    title: Phase B event envelope contract
    priority: P0
    status: ready
    last_updated: 2026-02-28
    acceptance:
      - Define action event schema and response schema
      - Add validator + fixtures + tests
      - Preserve /a2ui/generate compatibility
  - id: INT-004
    lane: interaction
    title: Task lifecycle + streaming status contract (queued/running/input_required/completed/failed)
    priority: P0
    status: ready
    last_updated: 2026-02-28
    acceptance:
      - Extend action response envelope with task_id, status, progress message, and terminal artifact/error
      - Support incremental status updates over SSE/WebSocket without breaking current POST flow
      - Include input_required handoff signal for human takeover (auth/payment/captcha)
      - Validator + fixtures + tests for lifecycle transitions
  - id: INT-002
    lane: interaction
    title: Client model store + path bindings
    priority: P1
    status: todo
    last_updated: 2026-02-28
    acceptance:
      - Path read/write utilities with tests
      - Controlled state updates for interactive components
  - id: INT-003
    lane: interaction
    title: Button action dispatch loop
    priority: P1
    status: todo
    last_updated: 2026-02-28
    acceptance:
      - POST /a2ui/action with action + model snapshot
      - Apply response through incremental pipeline
  - id: TRUST-001
    lane: trust_ux
    title: Source and freshness badges
    priority: P1
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-05
    acceptance:
      - Show data source per major block group when available
      - Last-updated timestamp at screen level
  - id: TRUST-002
    lane: trust_ux
    title: Action provenance + human-control affordances
    priority: P0
    status: ready
    last_updated: 2026-03-01
    acceptance:
      - Display per-action provenance (initiator, tool/source, timestamp, confidence)
      - Provide explicit pause/resume/takeover controls on active tasks
      - Log user approvals for sensitive steps (login/payment/submit)
  - id: UI-001
    lane: ui_polish
    title: Frontend polish pass for dynamic A2UI surfaces
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-06
    acceptance:
      - Improve visual hierarchy/readability across mixed block types (section/row/column/image/metric/list)
      - Ensure long content gracefully wraps/scrolls without clipping or layout collapse
      - Standardize loading/error/streaming states with clear user feedback
      - Validate responsive behavior and keyboard focus states
      - Keep functionality unchanged; pass tests/typecheck/build
  - id: INT-005
    lane: interaction
    title: A2UI modality negotiation + structured input contract
    priority: P0
    status: ready
    last_updated: 2026-03-04
    acceptance:
      - Extend action/task envelope with supported modalities (text/form/file/media) and negotiated response mode
      - Add input_required payload schema for deterministic human handoff (reason, required_fields, resume_token)
      - Validator + fixtures + tests for modality negotiation and resume flow compatibility

  - id: INT-006
    lane: interaction
    title: AG-UI/A2UI transport adapter + capability advertisement
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-05
    acceptance:
      - Add adapter layer for AG-UI event mapping to current action/task lifecycle envelopes
      - Support client capability advertisement (supported components/modalities/version)
      - Reject unsupported remote UI intents safely with actionable fallback payload
      - Compatibility tests covering local POST flow and streaming updates
      - Add dual-stack A2UI compatibility for v0.8 (beginRendering/surfaceUpdate/dataModelUpdate) and v0.9 (createSurface/updateComponents/updateDataModel/sendDataModel)
      - Return deterministic ValidationFailed-style error payloads with actionable recovery hints when remote payloads violate catalog or lifecycle constraints
  - id: UI-002
    lane: ui_polish
    title: Non-technical first-run UX simplification
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-04
    acceptance:
      - Remove duplicate thinking indicators; unify into one primary status area
      - Hide raw JSON behind advanced/debug affordance (not primary CTA)
      - Improve plain-language copy for generation, errors, and fallback states
      - Keep current functionality and pass quality gates
  - id: UX-003
    lane: ui_polish
    title: Saved screens and profile tabs
    priority: P0
    status: ready
    last_updated: 2026-03-04
    acceptance:
      - Add ability to save named screens/profiles and switch via tabs
      - Persist profile definitions and current active tab locally
      - Support manual refresh and optional auto-refresh cadence per profile
      - Maintain compatibility with existing generation flow and quality gates

  - id: INT-007
    lane: interaction
    title: Interrupt/resume lifecycle parity (AG-UI draft compatible)
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-09
    acceptance:
      - Extend run-finished envelope to support outcome: success|interrupt with structured interrupt payload (id/reason/payload)
      - Add resume envelope support (thread-bound resume with interruptId and payload)
      - Preserve backwards compatibility for existing completed/failed/input_required signaling
      - Validator + fixtures + tests for interrupt/resume happy-path and invalid-resume handling

  - id: INT-008
    lane: interaction
    title: Screenshot/action harness adapter for computer-use backends
    priority: P0
    status: ready
    last_updated: 2026-03-08
    acceptance:
      - Normalize screenshot-request and batched UI action execution loop across supported providers
      - Support screenshot-first turns and deterministic replay of action arrays before next capture
      - Add tool-version/capability negotiation (including optional actions like zoom) with explicit downgrade behavior
      - Add coordinate-space remap utility for downscaled screenshots with deterministic click mapping
      - Expose harness safety policy (allowed domains/actions, human confirmation checkpoints)
      - Compatibility tests for click/type/scroll/wait/screenshot loops and terminal-state detection

  - id: INT-009
    lane: interaction
    title: Unified run-state, interrupt, capability, trust, and mixed-stream contract
    priority: P0
    status: ready
    last_updated: 2026-03-10
    acceptance:
      - Define one normalized run event model covering run_started, status_delta, text_chunk, ui_delta, input_required, interrupted, resumed, action_batch_requested, action_batch_executed, completed, errored, and handoff_requested
      - Tag every event and UI payload with source metadata, provenance, and trusted|untrusted classification before render
      - Route conversational text, declarative UI updates, and screenshot/action execution through the same append-only run timeline and replay log
      - Reject unvalidated or unsupported component deltas via schema validation, allowlist checks, and surface-ownership guards
      - Advertise renderer/backend capabilities for components, modalities, interrupts, screenshot support, replay support, and payload limits with explicit downgrade behavior
      - Preserve compatibility with current A2UI/AG-UI adapter work and add fixtures/tests for mixed text+UI streams, interrupt-resume, trust tagging, provenance display, and capability-gated execution

  - id: INT-010
    lane: interaction
    title: Mixed text + UI parser and stream normalization
    priority: P1
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-10
    acceptance:
      - Parse and normalize runs that interleave narrative text with embedded A2UI or equivalent structured UI payloads
      - Support XML-style or fenced payload delimiters without duplicating parser logic across transports
      - Preserve ordering so text chunks and ui_deltas replay identically in timeline views
      - Add fixtures/tests for mixed-stream happy path, malformed payload isolation, and downgrade-to-text behavior

  - id: REL-003
    lane: reliability
    title: Deterministic run replay and timeline inspector
    priority: P2
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-10
    acceptance:
      - Reconstruct visible run state deterministically from append-only event history
      - Inspect text, UI deltas, interrupts, approvals, screenshot/action steps, and terminal outcomes in one timeline view
      - Surface provenance and trust metadata for each timeline event without requiring raw JSON as the primary UX
      - Add fixtures/tests proving replay consistency across reconnects and mixed declarative/screenshot runs

  - id: TRUST-003
    lane: trust_ux
    title: Prompt-injection and high-impact action confirmation rail
    priority: P1
    status: ready
    last_updated: 2026-03-07
    acceptance:
      - Flag untrusted on-screen instructions distinctly from user-authored intent
      - Require explicit user confirmation for high-impact actions (submit/purchase/delete/auth)
      - Log confirmation decisions and interruption reasons in task timeline
      - Add safety-copy guidance in UI when model encounters conflicting page instructions

  - id: REL-002
    lane: reliability
    title: Streaming/subscription continuity for long-running remote tasks
    priority: P2
    status: todo
    last_updated: 2026-03-07
    acceptance:
      - Support resumable task subscription for non-terminal tasks across reconnects
      - Add bounded history replay for latest task events/messages
      - Emit deterministic unsupported-operation behavior when subscribing to terminal tasks
      - Validate against long-running and intermittent-network test fixtures

quality_gates:
  - npm test
  - npm run typecheck
  - npm run build
  - smoke: POST /a2ui/generate returns ok:true
