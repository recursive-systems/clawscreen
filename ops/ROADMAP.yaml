version: 1
product: ClawScreen
north_star: Agent-native HUD with trustworthy, adaptive, tool-backed UI

recent_updates:
  - date: 2026-03-05
    change: Completed TRUST-001 source and freshness badges in primary status rail
    rationale: Added per-screen source badges derived from payload provenance and explicit last-updated timestamp so users can quickly judge trust/freshness without opening debug JSON.
  - date: 2026-03-05
    change: Completed INT-006 dual-stack transport compatibility and capability advertisement
    rationale: Added v0.8/v0.9 message alias normalization, deterministic ValidationFailed guidance, and explicit capability metadata for safer client/server interoperability.
  - date: 2026-03-05
    change: Elevated INT-006 from P1/todo to P0/ready
    rationale: A2UI v0.9 introduces breaking lifecycle and schema shifts (createSurface/updateComponents/updateDataModel/sendDataModel, unified catalog, stricter validation); interoperability and trust UX now depend on proactive transport compatibility.

lanes:
  - id: reliability
    outcome: Stable, low-latency generation/render pipeline
  - id: interaction
    outcome: Agentic interaction loop (event -> LLM-decided next UI)
  - id: trust_ux
    outcome: Source/freshness/explainability in every surface
  - id: ui_polish
    outcome: Cohesive, premium HUD quality and clear visual hierarchy under dynamic generation

backlog:
  # execution metadata:
  # - status: todo|ready|in_progress|blocked|done
  # - owner: single accountable owner while in_progress (optional when todo/ready)
  # - target_date: YYYY-MM-DD for active items when known
  - id: REL-001
    lane: reliability
    title: Gateway polling termination hardening
    priority: P0
    status: done
    last_updated: 2026-02-27
    acceptance:
      - No long polling after terminal assistant stop without parseable JSON
      - Clear retry reason surfaced to UI
      - test/typecheck/build pass
  - id: INT-001
    lane: interaction
    title: Phase B event envelope contract
    priority: P0
    status: ready
    last_updated: 2026-02-28
    acceptance:
      - Define action event schema and response schema
      - Add validator + fixtures + tests
      - Preserve /a2ui/generate compatibility
  - id: INT-004
    lane: interaction
    title: Task lifecycle + streaming status contract (queued/running/input_required/completed/failed)
    priority: P0
    status: ready
    last_updated: 2026-02-28
    acceptance:
      - Extend action response envelope with task_id, status, progress message, and terminal artifact/error
      - Support incremental status updates over SSE/WebSocket without breaking current POST flow
      - Include input_required handoff signal for human takeover (auth/payment/captcha)
      - Validator + fixtures + tests for lifecycle transitions
  - id: INT-002
    lane: interaction
    title: Client model store + path bindings
    priority: P1
    status: todo
    last_updated: 2026-02-28
    acceptance:
      - Path read/write utilities with tests
      - Controlled state updates for interactive components
  - id: INT-003
    lane: interaction
    title: Button action dispatch loop
    priority: P1
    status: todo
    last_updated: 2026-02-28
    acceptance:
      - POST /a2ui/action with action + model snapshot
      - Apply response through incremental pipeline
  - id: TRUST-001
    lane: trust_ux
    title: Source and freshness badges
    priority: P1
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-05
    acceptance:
      - Show data source per major block group when available
      - Last-updated timestamp at screen level
  - id: TRUST-002
    lane: trust_ux
    title: Action provenance + human-control affordances
    priority: P0
    status: ready
    last_updated: 2026-03-01
    acceptance:
      - Display per-action provenance (initiator, tool/source, timestamp, confidence)
      - Provide explicit pause/resume/takeover controls on active tasks
      - Log user approvals for sensitive steps (login/payment/submit)
  - id: UI-001
    lane: ui_polish
    title: Frontend polish pass for dynamic A2UI surfaces
    priority: P0
    status: ready
    last_updated: 2026-03-03
    acceptance:
      - Improve visual hierarchy/readability across mixed block types (section/row/column/image/metric/list)
      - Ensure long content gracefully wraps/scrolls without clipping or layout collapse
      - Standardize loading/error/streaming states with clear user feedback
      - Validate responsive behavior and keyboard focus states
      - Keep functionality unchanged; pass tests/typecheck/build
  - id: INT-005
    lane: interaction
    title: A2UI modality negotiation + structured input contract
    priority: P0
    status: ready
    last_updated: 2026-03-04
    acceptance:
      - Extend action/task envelope with supported modalities (text/form/file/media) and negotiated response mode
      - Add input_required payload schema for deterministic human handoff (reason, required_fields, resume_token)
      - Validator + fixtures + tests for modality negotiation and resume flow compatibility

  - id: INT-006
    lane: interaction
    title: AG-UI/A2UI transport adapter + capability advertisement
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-05
    acceptance:
      - Add adapter layer for AG-UI event mapping to current action/task lifecycle envelopes
      - Support client capability advertisement (supported components/modalities/version)
      - Reject unsupported remote UI intents safely with actionable fallback payload
      - Compatibility tests covering local POST flow and streaming updates
      - Add dual-stack A2UI compatibility for v0.8 (beginRendering/surfaceUpdate/dataModelUpdate) and v0.9 (createSurface/updateComponents/updateDataModel/sendDataModel)
      - Return deterministic ValidationFailed-style error payloads with actionable recovery hints when remote payloads violate catalog or lifecycle constraints
  - id: UI-002
    lane: ui_polish
    title: Non-technical first-run UX simplification
    priority: P0
    status: done
    owner: clawscreen-product
    last_updated: 2026-03-04
    acceptance:
      - Remove duplicate thinking indicators; unify into one primary status area
      - Hide raw JSON behind advanced/debug affordance (not primary CTA)
      - Improve plain-language copy for generation, errors, and fallback states
      - Keep current functionality and pass quality gates
  - id: UX-003
    lane: ui_polish
    title: Saved screens and profile tabs
    priority: P0
    status: ready
    last_updated: 2026-03-04
    acceptance:
      - Add ability to save named screens/profiles and switch via tabs
      - Persist profile definitions and current active tab locally
      - Support manual refresh and optional auto-refresh cadence per profile
      - Maintain compatibility with existing generation flow and quality gates

quality_gates:
  - npm test
  - npm run typecheck
  - npm run build
  - smoke: POST /a2ui/generate returns ok:true
