<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawScreen — A2UI Prompt-to-Screen v1</title>
  </head>
  <body data-theme="light">
    <div class="app" id="app" data-state="idle">
      <header class="top-bar" aria-live="polite">
        <div>
          <p class="label">Now</p>
          <h1 id="timeDisplay">--:--</h1>
          <p id="dateDisplay" class="subtle">Loading date…</p>
        </div>

        <div class="scene-meta">
          <p class="label">A2UI Screen</p>
          <h2 id="sceneTitle">Dynamic Screen</h2>
          <p id="sceneSubtitle" class="subtle"></p>
        </div>
      </header>

      <section class="controls" aria-label="Prompt composer">
        <div class="prompt-row">
          <input
            id="promptInput"
            type="text"
            placeholder="Type naturally (example: Show me everything before leaving in 20 minutes)"
            autocomplete="off"
          />
          <button id="generateBtn" type="button">Generate</button>
          <button id="retryBtn" type="button">Retry</button>
        </div>

        <div class="controls-row">
          <details class="advanced-tools">
            <summary>Advanced / Debug</summary>
            <button id="showRawBtn" type="button">View technical payload (JSON)</button>
          </details>
        </div>
      </section>

      <main class="scene-layout">
        <section id="sceneCards" class="cards-grid" aria-live="polite"></section>
      </main>

      <footer id="statusBar" class="status" role="status" aria-live="polite">
        Initializing…
      </footer>
    </div>

    <dialog id="rawSceneDialog" class="raw-dialog">
      <div class="dialog-head">
        <h3>Raw A2UI Payload</h3>
        <button id="rawCloseBtn" type="button">Close</button>
      </div>
      <pre id="rawSceneOutput"></pre>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
