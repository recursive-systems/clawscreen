<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawScreen — A2UI Prompt-to-Screen v1</title>
  </head>
  <body data-theme="light">
    <div class="app" id="app" data-state="idle">
      <header class="top-bar" aria-live="polite">
        <div>
          <p class="label">Now</p>
          <h1 id="timeDisplay">--:--</h1>
          <p id="dateDisplay" class="subtle">Loading date…</p>
        </div>

        <div class="scene-meta">
          <p class="label">A2UI Screen</p>
          <h2 id="sceneTitle">Dynamic Screen</h2>
          <p id="sceneSubtitle" class="subtle"></p>
        </div>
      </header>

      <section class="profile-bar" aria-label="Saved screens">
        <div class="profile-bar-head">
          <p class="label">Saved screens</p>
          <div class="profile-actions">
            <button id="saveProfileBtn" type="button">Save copy as new tab</button>
            <button id="renameProfileBtn" type="button">Rename tab</button>
            <button id="deleteProfileBtn" type="button">Delete tab</button>
          </div>
        </div>
        <div id="profileTabs" class="profile-tabs" role="tablist" aria-label="Screen tabs"></div>
        <div class="profile-refresh-row">
          <button id="refreshProfileBtn" type="button">Refresh this tab</button>
          <label class="auto-refresh-toggle" for="autoRefreshEnabled">
            <input id="autoRefreshEnabled" type="checkbox" />
            Auto refresh
          </label>
          <label for="autoRefreshInterval" class="auto-refresh-label">Every</label>
          <select id="autoRefreshInterval" aria-label="Auto refresh interval">
            <option value="30">30 sec</option>
            <option value="60" selected>60 sec</option>
            <option value="120">2 min</option>
            <option value="300">5 min</option>
          </select>
        </div>
      </section>

      <main class="scene-layout">
        <section id="sceneCards" class="cards-grid" aria-live="polite"></section>
      </main>

      <section class="controls chat-composer" aria-label="Prompt composer">
        <div class="prompt-row">
          <input
            id="promptInput"
            type="text"
            placeholder="Type naturally (example: Show me everything before leaving in 20 minutes)"
            autocomplete="off"
          />
          <button id="generateBtn" type="button">Create screen</button>
          <button id="retryBtn" type="button">Try again</button>
        </div>

        <section class="status" aria-live="polite" aria-atomic="true">
          <div class="status-line">
            <span id="statusPill" class="state-label">Ready</span>
            <span id="statusTitle" class="status-title">Screen status</span>
            <span id="statusInfo" class="status-info" title="">ⓘ</span>
          </div>
          <p id="statusMessage" class="status-message">Describe what you want to see, then choose Create screen.</p>
          <div class="trust-row" aria-live="polite">
            <div id="sourceBadges" class="source-badges" aria-label="Data sources">
              <span class="trust-placeholder">Source: waiting for live data</span>
            </div>
            <p id="screenUpdatedAt" class="screen-updated-at">Last updated: —</p>
          </div>
        </section>

        <div class="controls-row">
          <details class="advanced-tools">
            <summary>Debug tools (advanced)</summary>
            <button id="showRawBtn" type="button">View raw JSON payload</button>
          </details>
        </div>
      </section>
    </div>

    <dialog id="rawSceneDialog" class="raw-dialog">
      <div class="dialog-head">
        <h3>Raw A2UI Payload</h3>
        <button id="rawCloseBtn" type="button">Close</button>
      </div>
      <pre id="rawSceneOutput"></pre>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
